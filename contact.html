<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSphere - Contact</title>
    <link rel="stylesheet" href="/static/code.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">EventSphere</div>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('about') }}">About</a></li>
                <li><a href="{{ url_for('schedule') }}">Schedule</a></li>
                <li><a href="{{ url_for('gallery') }}">Gallery</a></li>
                <li><a href="{{ url_for('contact') }}">Contact</a></li>
                <li><a href="{{ url_for('registration') }}" class="btn-primary">Register</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact">
        <div class="contact-header">
            <h2>Contact Us</h2>
            <p>We’d love to hear from you. Get in touch with us for any queries.</p>
        </div>

        <div class="contact-content">
            <!-- Contact Form -->
            <div class="contact-form">
                <form action="process_contact.php" method="POST">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Write your message here" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>

            <!-- Google Maps -->
            <div class="contact-map">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3154.8260118318316!2d-122.08424968468107!3d37.42206557982724!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808fb0e5a31b08f7%3A0x1745a7b1225e945c!2sGoogleplex!5e0!3m2!1sen!2sus!4v1634089272751!5m2!1sen!2sus" 
                    width="100%" 
                    height="350" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 EventSphere. All Rights Reserved.</p>
    </footer>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
