<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EventSphere</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">EventSphere</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="schedule.html">Schedule</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="register.html" class="btn-primary">Register</a></li>
            </ul>
        </nav>
    </header>

    <!-- Sign In Section -->
    <section class="auth">
        <div class="auth-container">
            <h2>Sign In</h2>
            <form action="process_sign_in.php" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
                <p class="auth-switch">
                    Don't have an account? <a href="sign-up.html">Sign Up</a>
                </p>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 EventSphere. All Rights Reserved.</p>
    </footer>
   
</body>
</html>
